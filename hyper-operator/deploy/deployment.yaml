apiVersion: apps/v1
kind: Deployment
metadata:
  name: hyper-operator
  namespace: hyper-system
  labels:
    control-plane: controller-manager
spec:
  replicas: 1 # Leader election is enabled, 1 is perfect, can be 2 for HA
  selector:
    matchLabels:
      control-plane: controller-manager
  template:
    metadata:
      labels:
        control-plane: controller-manager
    spec:
      serviceAccountName: hyper-operator-sa
      containers:
        - name: manager
          image: taha/hyper-operator:latest # ◄ الـ Image بتاعتك
          imagePullPolicy: IfNotPresent
          command:
            - /manager
          args:
            - --leader-elect
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
      terminationGracePeriodSeconds: 10