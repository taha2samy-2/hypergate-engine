apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: hyperredis.hyper.io
spec:
  group: hyper.io
  names:
    kind: HyperRedis
    listKind: HyperRedisList
    plural: hyperredis
    singular: hyperredis
    shortNames:
      - hr
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - url
                - type
              properties:
                url:
                  type: string
                type:
                  type: string
                  enum:
                    - SINGLE
                    - CLUSTER
                    - SENTINEL
                poolSize:
                  type: integer
                  minimum: 1
                timeout:
                  type: string
                activeConnHealthCheck:
                  type: boolean
            status:
              type: object
              properties:
                state:
                  type: string
                lastCheck:
                  type: string
                  format: date-time