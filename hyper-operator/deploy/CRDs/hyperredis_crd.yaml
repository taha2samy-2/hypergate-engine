apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: hyperredis.hyper.io
spec:
  group: hyper.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["url", "type"]
              properties:
                url:
                  type: string
                type:
                  type: string
                  enum: ["SINGLE", "CLUSTER", "SENTINEL"]
                poolSize:
                  type: integer
                  minimum: 1
                timeout:
                  type: string
                activeConnHealthCheck:
                  type: boolean
            status:
              type: object
              properties:
                state:
                  type: string
                lastCheck:
                  type: string
                  format: date-time
          subresources:
            status: {}
      scope: Cluster
      names:
        plural: hyperredis
        singular: hyperredis
        kind: HyperRedis
        shortNames:
          - hr