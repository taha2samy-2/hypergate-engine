apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: hyperpolicies.hyper.io
spec:
  group: hyper.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["filters"]
              properties:
                filters:
                  type: array
                  items:
                    type: object
                    required: ["type", "options"]
                    properties:
                      type:
                        type: string
                      options:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
          subresources:
            status: {}
      scope: Cluster
      names:
        plural: hyperpolicies
        singular: hyperpolicy
        kind: HyperPolicy
        shortNames:
          - hp