apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: apikeyfilters.hyper.io
spec:
  group: hyper.io
  names:
    kind: ApiKeyFilter
    listKind: ApiKeyFilterList
    plural: apikeyfilters
    singular: apikeyfilter
    shortNames:
    - apikf
  scope: Cluster
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Redis Service
      type: string
      jsonPath: .spec.redisService
    - name: Value Format
      type: string
      jsonPath: .spec.valueFormat
    - name: Hash Algorithm
      type: string
      jsonPath: .spec.hashAlgorithm
    schema:
      openAPIV3Schema:
        type: object
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            type: object
            required:
            - redisService
            properties:
              keyNames:
                type: array
                default: ["x-api-key"]
                items:
                  type: string
              keyInHeader:
                type: boolean
                default: true
              keyInQuery:
                type: boolean
                default: true
              hideCredentials:
                type: boolean
                default: true
              redisService:
                type: string
              redisKeyPrefix:
                type: string
                default: "apikey:"
              hashAlgorithm:
                type: string
                default: "sha256"
                enum: [sha256, md5, none]
              valueFormat:
                type: string
                default: "hash"
                enum: [plain, hash, json]
              delimiter:
                type: string
                default: "|"
              statusCheck:
                type: object
                properties:
                  enabled:
                    type: boolean
                    default: false
                  fieldName:
                    type: string
                  expectedValue:
                    type: string
              outputMappings:
                type: array
                items:
                  type: object
                  required:
                  - targetHeader
                  properties:
                    targetHeader:
                      type: string
                    redisField:
                      type: string
                    jsonPath:
                      type: string
          status:
            type: object
