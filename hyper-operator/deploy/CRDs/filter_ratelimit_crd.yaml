apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: ratelimitfilters.hyper.io
spec:
  group: hyper.io
  names:
    kind: RateLimitFilter
    listKind: RateLimitFilterList
    plural: ratelimitfilters
    singular: ratelimitfilter
    shortNames:
    - rlf
  scope: Cluster
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    schema:
      openAPIV3Schema:
        type: object
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            type: object
            required:
            - domain
            - algorithm
            - redisService
            - descriptors
            properties:
              domain:
                type: string
              algorithm:
                type: string
                enum:
                - fixed_window
                - sliding_window_counter
                - token_bucket
                - leaky_bucket
                - sliding_window_log
              redisService:
                type: string
              headerMappings:
                type: object
                additionalProperties:
                  type: string
              responseHeaders:
                type: object
                properties:
                  enabled:
                    type: boolean
                    default: false
                  limitHeader:
                    type: string
                    default: "RateLimit-Limit"
                  remainingHeader:
                    type: string
                    default: "RateLimit-Remaining"
                  resetHeader:
                    type: string
                    default: "RateLimit-Reset"
              dynamicCost:
                type: object
                properties:
                  enabled:
                    type: boolean
                    default: false
                  sourceHeader:
                    type: string
                  defaultFallbackCost:
                    type: integer
                    format: int64
                    default: 1
                  maxAllowedCost:
                    type: integer
                    format: int64
              descriptors:
                type: array
                items:
                  type: object
                  required:
                  - entries
                  properties:
                    entries:
                      type: array
                      items:
                        type: object
                        required:
                        - key
                        properties:
                          key:
                            type: string
                          value:
                            type: string
                    limit:
                      type: integer
                      format: int32
                    unit:
                      type: string
                      enum:
                      - second
                      - minute
                      - hour
                      - day
                      - week
                      - month
                      - year
                    maxTokens:
                      type: number
                      format: double
                    fillRate:
                      type: number
                      format: double
                    bucketCapacity:
                      type: integer
                      format: int32
                    leakRate:
                      type: number
                      format: double
                    shadowMode:
                      type: boolean
                      default: false
                    failOpen:
                      type: boolean
                      default: false
          status:
            type: object
