apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: oidcfilters.hyper.io
spec:
  group: hyper.io
  names:
    kind: OidcFilter
    listKind: OidcFilterList
    plural: oidcfilters
    singular: oidcfilter
    shortNames:
    - oidcf
  scope: Cluster
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Provider
      type: string
      jsonPath: .spec.providerName
    - name: Issuer
      type: string
      jsonPath: .spec.issuerUrl
    schema:
      openAPIV3Schema:
        type: object
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            type: object
            required:
            - providerName
            - issuerUrl
            - clientId
            properties:
              providerName:
                type: string
                description: "Human-readable label used in log messages."

              issuerUrl:
                type: string
                description: "OIDC issuer base URL (e.g. https://accounts.example.com)."

              clientId:
                type: string
                description: "OAuth2 client identifier expected in the JWT aud claim."

              skipDiscovery:
                type: boolean
                default: false
                description: "Disables automatic OIDC discovery. When true, jwksUrl must be supplied explicitly."

              jwksUrl:
                type: string
                description: "Explicit JWKS endpoint. Required when skipDiscovery is true."

              jwksCacheDuration:
                type: string
                default: "300s"
                description: "Maximum age of a cached JWKS key set. Go duration string (e.g. '300s', '5m')."

              jwksTimeout:
                type: string
                default: "2s"
                description: "HTTP client deadline for fetching the JWKS endpoint. Go duration string."

              clockSkew:
                type: string
                default: "60s"
                description: "Maximum tolerated clock difference when validating JWT nbf/exp claims. Go duration string."

              userInfoUrl:
                type: string
                description: "OIDC UserInfo endpoint used to validate opaque (non-JWT) access tokens."

              userInfoTimeout:
                type: string
                default: "2s"
                description: "HTTP client deadline for calling userInfoUrl. Go duration string."

              userIdClaim:
                type: string
                default: "sub"
                description: "JWT claim used as the principal identifier."

              emailClaim:
                type: string
                default: "email"
                description: "JWT claim containing the user's email address."

              groupsClaim:
                type: string
                default: "groups"
                description: "JWT claim containing the user's group memberships."

              allowUnverifiedEmail:
                type: boolean
                default: false
                description: "Permits requests from users whose email_verified claim is false."

              claimToHeaders:
                type: array
                description: "Zero or more claim-to-upstream-header mappings."
                items:
                  type: object
                  required:
                  - headerName
                  - claimName
                  properties:
                    headerName:
                      type: string
                      description: "Upstream request header that will receive the claim value."
                    claimName:
                      type: string
                      description: "JWT or UserInfo claim to extract."

          status:
            type: object
