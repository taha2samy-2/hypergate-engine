apiVersion: v1
kind: ServiceAccount
metadata:
  name: hyper-operator-sa
  namespace: hyper-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hyper-operator-role
rules:
  # 1. Permissions for managing our custom CRDs (Group: hyper.io)
  - apiGroups: ["hyper.io"]
    resources: ["hyperconfigs", "hyperredis", "hyperpolicies", "hyperroutes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["hyper.io"]
    resources: ["hyperconfigs/status", "hyperredis/status", "hyperpolicies/status", "hyperroutes/status"]
    verbs: ["get", "update", "patch"]

  # 2. Permissions for core K8s resources we manipulate (DaemonSets, ConfigMaps, Services, etc.)
  - apiGroups: [""]
    resources: ["configmaps", "services", "serviceaccounts", "namespaces", "events"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["daemonsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hyper-operator-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: hyper-operator-role
subjects:
  - kind: ServiceAccount
    name: hyper-operator-sa
    namespace: hyper-system